# ── cognitive complexity ─────────────────────────────────────────────────────
# Default is 25. Lower = enforce smaller functions. LaTeX parsing logic can
# legitimately be complex, so we keep it at a reasonable ceiling.
cognitive-complexity-threshold = 20
# type-complexity-threshold = 3
# ── function argument count ───────────────────────────────────────────────────
# Warn when a function has more than N parameters (default: 7).
too-many-arguments-threshold = 6

# ── documentation ─────────────────────────────────────────────────────────────
# Don't require docs on private items (public API crates opt-in via deny(missing_docs)).
missing-docs-in-crate-items = false

# ── allowed mixed attributes ──────────────────────────────────────────────────
# Permit #[allow(clippy::...)] to appear on the same item as #[derive(...)].
allow-mixed-uninlined-format-args = false

# ── msrv ─────────────────────────────────────────────────────────────────────
# Clippy uses this to skip lints that require a newer Rust than your MSRV.
msrv = "1.86"
