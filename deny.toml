[bans]
# Warn when the same crate appears with two different versions in the tree.
multiple-versions = "warn"
wildcards         = "deny"    # forbid  version specs
highlight         = "all"

# ── sources ───────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and our own workspace paths.
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
# registry   = ["https://github.com/rust-lang/crates.io-index"]
